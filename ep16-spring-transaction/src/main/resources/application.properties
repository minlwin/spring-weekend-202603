spring.application.name=ep16-spring-transaction

spring.datasource.url=jdbc:mysql://localhost:3306/mydb
spring.datasource.username=myuser
spring.datasource.password=mypass

app.sale-price-rate=10
app.tax-rate=5

app.sql.employee.is-present=select count(id) from employee where id = :id

app.sql.supplier.is-present=select count(id) from supplier where id = :id

app.sql.product.is-present=select count(id) from product where id = :id

app.sql.product-supplier.is-present=select count(*) from product_supplier \
	where product_id = :productId and supplier_id = :supplierId
app.sql.product-supplier.create=insert into product_supplier(product_id, supplier_id) \
	values (:productId, :supplierId)
	
app.sql.purchase-product.create=insert into purchase_product(product_id, version, purchase_id, unit_price, quantity) \
	values (:productId, :version, :purchaseId, :unitPrice, :quantity)
app.sql.purchase-product.find-by-purchase-id=select pp.product_id, pp.version, pd.name productName, pp.quantity amount, \
	csh.purchase_price, csh.sale_price, csh.amount stock, \
	lsh.purchase_price lastPurchasePrice, lsh.sale_price lastSalePrice, lsh.amount lastStock \
	from purchase_product pp \
	join product pd on pd.id = pp.product_id \
	join stock_history csh on pp.product_id = csh.product_id and pp.version = csh.version \
	join stock_history lsh on pp.product_id = lsh.product_id and pp.version - 1 = lsh.version \
	where pp.purchase_id = :purchaseId

app.sql.purchase.create=insert into purchase(employee_id, supplier_id, purchase_date, transportation_fee) \
	values (:employeeId, :supplierId, :purchaseDate, :transportationFees)
app.sql.purchase.find-by-id=select pc.id, pc.employee_id, em.name as employeeName, pc.supplier_id, sp.name supplierName, \
	sp.phone supplierPhone, sp.email supplierEmail, pc.purchase_date, pc.transportation_fee from purchase pc \
	join employee em on em.id = pc.employee_id \
	join supplier sp on sp.id = pc.supplier_id \
	where pc.id = :id

app.sql.stock.find-by-id=select * from stock where product_id = :productId
app.sql.stock.update=update stock set version = :version, sale_price = :salePrice, purchase_price = :purchasePrice, \
	stock_amount = :amount where product_id = :productId
	
app.sql.stock-history.create=insert into stock_history (product_id, version, action_type, sale_price, purchase_price, amount) \
	values (:productId, :version, :actionType, :salePrice, :purchasePrice, :amount)
